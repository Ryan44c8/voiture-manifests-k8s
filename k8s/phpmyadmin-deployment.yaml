apiVersion: apps/v1
kind: Deployment
metadata:
  name: phpmyadmin
  namespace: voiture
spec:
  selector:
    matchLabels:
      app: phpmyadmin
  template:
    metadata:
      labels:
        app: phpmyadmin
    spec:
      containers:
        - name: phpmyadmin
          image: phpmyadmin:5.2
          env:
            - name: PMA_HOST
              value: db
            - name: MYSQL_ROOT_PASSWORD
              value: rootpass
          ports:
            - containerPort: 80
