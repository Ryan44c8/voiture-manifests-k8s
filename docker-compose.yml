version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nextjs_app
    restart: always
    expose:
      - "3000"   # exposé uniquement au réseau interne Docker
    environment:
      DB_HOST: db
      DB_USER: user
      DB_PASS: pass
      DB_NAME: myapp
      JWT_SECRET: secretKey
    depends_on:
      - db

  db:
    image: mysql:8
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: myapp
      MYSQL_USER: user
      MYSQL_PASSWORD: pass
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    # ⚠️ Pas de ports exposés → MySQL reste interne

  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: phpmyadmin_app
    restart: always
    expose:
      - "80"   # exposé uniquement au réseau interne Docker
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: rootpass
    depends_on:
      - db

volumes:
  db-data:
