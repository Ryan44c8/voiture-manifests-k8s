name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  # 1. Build & Push
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ secrets.GHCR_USERNAME }} --password-stdin

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ secrets.GHCR_USERNAME }}/voiture-frontend:latest

  # 2. Tests
  test:
    runs-on: self-hosted
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run frontend tests
        run: |
          docker run --rm ghcr.io/${{ secrets.GHCR_USERNAME }}/voiture-frontend:latest npm test

  # 3. Déploiement sur k3s
  deploy:
    runs-on: self-hosted
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 -d > $HOME/.kube/config

      - name: Test cluster access
        run: kubectl get nodes

      - name: Deploy to k3s
        run: kubectl apply -f k8s/
