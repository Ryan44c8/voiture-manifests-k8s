apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: voiture
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/ryan44c8/voiture-frontend:ea9527c8f448698233fefbca748ca7eaac0b235a
          ports:
            - containerPort: 3000
          env:
            - name: DB_HOST
              value: db
            - name: DB_USER
              value: user
            - name: DB_PASS
              value: pass
            - name: DB_NAME
              value: myapp
            - name: JWT_SECRET
              value: secretKey
